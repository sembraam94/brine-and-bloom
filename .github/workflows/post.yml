# .github/workflows/post.yml
#
# The autonomous poster. Runs EVERY HOUR but almost always does nothing: each
# run just checks whether "now" is one of the slots in strategy.json and exits
# in ~30s if not. When it IS a slot, it generates and publishes one post, then
# commits the updated history.json back to the repo.
#
# Why hourly instead of a fixed daily cron: the posting schedule (which days,
# which hours, how many per week) lives in strategy.json and is rewritten
# automatically by the analyzer. Hourly + in-script gating lets the strategy
# change the schedule with zero edits to this file. The committed state also
# counts as repo activity, which stops GitHub auto-disabling the schedule.

name: Brine & Bloom — hourly poster

on:
  schedule:
    # cron is UTC; :05/:35 dodges the top-of-hour load spike. The poster checks
    # every 30 min and only posts when strategy.json says a slot is due. Checking
    # twice an hour (free on a public repo) + a 150-min tolerance window means a
    # GitHub-dropped run can't cause a missed post (which happened on hourly+90min).
    - cron: "5,35 * * * *"
  workflow_dispatch:        # manual run — also used for the first live post
    inputs:
      force:
        description: "Post now, ignoring the schedule?"
        type: choice
        options: ["no", "yes"]
        default: "no"
      dry_run:
        description: "Dry run (generate + print, do NOT publish)?"
        type: choice
        options: ["no", "yes"]
        default: "no"
      format:
        description: "Force a format (auto = use the slot's)"
        type: choice
        options: ["auto", "image", "carousel", "reel"]
        default: "auto"
      sample:
        description: "Sample mode: generate + host to R2 (persistent link), do NOT post"
        type: choice
        options: ["no", "yes"]
        default: "no"
      sample_model:
        description: "Try a different image model for the sample (e.g. google/imagen-4-ultra); blank = default"
        required: false
        default: ""

# Serialize the poster and the analyzer so they never push to the state files at
# the same time. cancel-in-progress:false lets an in-flight publish finish.
concurrency:
  group: ig-state
  cancel-in-progress: false

permissions:
  contents: write           # needed to push the updated history.json

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Generate and publish the post (no-op if not a slot)
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          IG_USER_ID:          ${{ secrets.IG_USER_ID }}   # optional; derived from the token if unset
          IG_ACCESS_TOKEN:     ${{ secrets.IG_ACCESS_TOKEN }}
          # Optional R2 (metadata-strip re-host). If unset, images post straight from the generator URL.
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:   ${{ secrets.R2_PUBLIC_BASE_URL }}
          # Set from the "Run workflow" dropdown; empty on scheduled runs (normal gated behavior).
          DRY_RUN: ${{ github.event.inputs.dry_run == 'yes' && '1' || '' }}
          FORCE:   ${{ github.event.inputs.force == 'yes' && '1' || '' }}
          FORMAT:  ${{ github.event.inputs.format != 'auto' && github.event.inputs.format || '' }}
          SAMPLE:  ${{ github.event.inputs.sample == 'yes' && '1' || '' }}
          SAMPLE_MODEL: ${{ github.event.inputs.sample_model }}
        run: python autopost.py

      - name: Commit post history
        run: |
          git config user.name  "brine-and-bloom-bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new post this run (dry run or not a slot) — nothing to commit."
            exit 0
          fi
          git commit -m "post: log run for $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && exit 0
            echo "push failed (attempt $i), retrying..."; sleep $((RANDOM % 8 + 2))
          done
          echo "Could not push history after retries" >&2; exit 1
