# Clipkroniek — transcription test (manual only).
# Runs one clip through STT + the cut-moment assist and prints the transcript, audio
# peak, verbal moment, and final cut. Uses GROQ_API_KEY + ANTHROPIC_API_KEY.

name: Clipkroniek — transcription test

on:
  workflow_dispatch:
    inputs:
      clip_url:
        description: "Twitch clip URL to transcribe/test"
        required: true
      clip_id:
        description: "clip id (filename)"
        required: false
        default: "stttest"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: clipkroniek
        run: pip install -r requirements.txt

      - name: Cache Whisper model (STT fallback)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: fw-large-v3-turbo-v1

      - name: Transcribe + cut-moment test
        working-directory: clipkroniek
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLIP_URL:          ${{ github.event.inputs.clip_url }}
          CLIP_ID:           ${{ github.event.inputs.clip_id }}
        run: python transcribe_test.py
