# Clipkroniek — clip poster (lives in the same repo as Brine & Bloom; reuses its
# ANTHROPIC + R2 secrets, plus TWITCH_* and CK_IG_ACCESS_TOKEN). Runs the poster
# in the clipkroniek/ subfolder.
#
# The schedule is intentionally COMMENTED OUT until the first live post is
# validated by hand (Run workflow -> discover_only, then dry_run, then force).
# Uncomment the cron to go fully autonomous.

name: Clipkroniek — clip poster

on:
  # schedule:
  #   - cron: "7,37 * * * *"   # ENABLE after the first validated live post
  workflow_dispatch:
    inputs:
      force:
        description: "Post now, ignoring the schedule?"
        type: choice
        options: ["no", "yes"]
        default: "no"
      dry_run:
        description: "Dry run (discover + build the reel, do NOT publish)?"
        type: choice
        options: ["no", "yes"]
        default: "no"
      discover_only:
        description: "Discover + caption only (no download/build/publish)?"
        type: choice
        options: ["no", "yes"]
        default: "no"
      slot_game:
        description: "Override game (blank = slot's): gta | valorant"
        required: false
        default: ""
      slot_region:
        description: "Override region (blank = slot's): western | asian"
        required: false
        default: ""

concurrency:
  group: ck-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: clipkroniek
        run: pip install -r requirements.txt

      - name: Discover, build, and publish (no-op if not a slot)
        working-directory: clipkroniek
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          IG_ACCESS_TOKEN:      ${{ secrets.CK_IG_ACCESS_TOKEN }}
          TWITCH_CLIENT_ID:     ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:   ${{ secrets.R2_PUBLIC_BASE_URL }}
          FORCE:         ${{ github.event.inputs.force == 'yes' && '1' || '' }}
          DRY_RUN:       ${{ github.event.inputs.dry_run == 'yes' && '1' || '' }}
          DISCOVER_ONLY: ${{ github.event.inputs.discover_only == 'yes' && '1' || '' }}
          SLOT_GAME:     ${{ github.event.inputs.slot_game }}
          SLOT_REGION:   ${{ github.event.inputs.slot_region }}
        run: python clippost.py

      - name: Commit post history
        run: |
          git config user.name  "clipkroniek-bot"
          git config user.email "actions@github.com"
          git add clipkroniek/
          if git diff --cached --quiet; then
            echo "No new post this run (dry run or not a slot) — nothing to commit."
            exit 0
          fi
          git commit -m "clipkroniek: log run for $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && exit 0
            echo "push failed (attempt $i), retrying..."; sleep $((RANDOM % 8 + 2))
          done
          echo "Could not push history after retries" >&2; exit 1
