# .github/workflows/refresh-token.yml
#
# Keeps BOTH Instagram access tokens alive forever, hands-off:
#   IG_ACCESS_TOKEN    (Brine & Bloom)
#   CK_IG_ACCESS_TOKEN (Clipkroniek)
# IG tokens last ~60 days; this refreshes weekly (well inside the window, past the
# 24h minimum age) and stores each fresh token back into its secret.
#
# REQUIRES one extra secret to store the rotated tokens automatically:
#   GH_PAT = a fine-grained Personal Access Token for THIS repo with
#            "Secrets: Read and write" permission. (The default GITHUB_TOKEN
#            cannot write secrets.)
# Without GH_PAT the run FAILS LOUDLY (so a failed-run email nags you to add it):
# the tokens still verify, but the rotated values are not stored and WILL expire.

name: Refresh IG tokens (Brine & Bloom + Clipkroniek)

on:
  schedule:
    - cron: "0 3 * * 1"        # weekly, Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false        # refresh both tokens even if one leg fails
      matrix:
        secret: [IG_ACCESS_TOKEN, CK_IG_ACCESS_TOKEN]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Refresh ${{ matrix.secret }}
        env:
          IG_ACCESS_TOKEN: ${{ secrets[matrix.secret] }}
        run: python refresh_token.py --out=new_token.txt

      - name: Store the refreshed token back into ${{ matrix.secret }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_PAT secret is not set. ${{ matrix.secret }} was refreshed"
            echo "but the rotated value could NOT be stored — the token will still"
            echo "expire (~60 days). Add a GH_PAT repo secret (fine-grained PAT with"
            echo "Secrets: Read and write on sembraam94/brine-and-bloom) for hands-off"
            echo "token refresh, then re-run this workflow."
            rm -f new_token.txt
            exit 1
          fi
          TOKEN="$(cat new_token.txt)"
          echo "::add-mask::$TOKEN"
          gh secret set ${{ matrix.secret }} --body "$TOKEN" --repo "$GITHUB_REPOSITORY"
          rm -f new_token.txt
          echo "${{ matrix.secret }} updated for another ~60 days."
