# Clipkroniek — DUTCH clip tracker (independent stream).
# Same tracker, run as TRACKER_VARIANT=nl: it reads strategy.tracker_nl (languages: nl,
# any category — Just Chatting as well as games) and keeps its own R2 state + dataset
# under tracker-nl/, so the Dutch data never mixes with the main game stream.
# Groundwork for a possible Clipkroniek_NL channel. $0 (Twitch + public-repo Actions).

name: Clipkroniek — NL clip tracker

on:
  schedule:
    - cron: "22,52 * * * *"     # every 30 min, offset from the poster (7,37) and main tracker (12,42)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ck-tracker-nl
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: clipkroniek
        run: pip install -r requirements.txt

      - name: Snapshot Dutch clips
        working-directory: clipkroniek
        env:
          TWITCH_CLIENT_ID:     ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:   ${{ secrets.R2_PUBLIC_BASE_URL }}
          TRACKER_VARIANT: "nl"
        run: python clip_tracker.py
